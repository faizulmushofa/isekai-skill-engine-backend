services:
  # ==========================================
  # Isekai Skill Engine Backend (NestJS)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: isekai-skill-backend
    restart: unless-stopped
    ports:
      - "8091:3090"   # host:container — akses via http://localhost:8091

    # env_file membaca nilai mentah tanpa interpolasi $
    # Gunakan ini untuk semua secrets agar karakter $ tidak di-expand
    env_file:
      - .env

    # Override hanya nilai yang TIDAK mengandung karakter $ khusus
    environment:
      NODE_ENV: production
      PORT: 3090

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
